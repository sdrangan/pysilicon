name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 120          # was: missing -> task was getting killed early
    permissions:
      contents: write            # was: read  -> needed to commit & push
      pull-requests: write       # was: read  -> needed to open the PR
      issues: read
      id-token: write
      actions: read              # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Turn budget + tool allowlist.
          # --max-turns 40: a 4-phase implement+test+lint+PR task needs many turns;
          #   the default budget was being exhausted, so Claude stopped gracefully partway.
          # --allowedTools: the default toolset does NOT permit arbitrary Bash, so
          #   pytest / mypy / ruff could not run. These must be explicitly allowed.
          claude_args: |
            --max-turns 60
            --allowedTools "Edit,Read,Write,Bash(python:*),Bash(pip:*),Bash(pytest:*),Bash(mypy:*),Bash(ruff:*),Bash(git:*),Bash(gh pr:*)"


