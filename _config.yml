title: "Waveflow"
description: "Python-based framework for hardware design and verification"
remote_theme: just-the-docs/just-the-docs
baseurl: "/waveflow" # Only needed if using a project page
url: "https://sdrangan.github.io"

# Navigation settings
nav_sort: case_insensitive
search_enabled: true

# Markdown options
markdown: kramdown
kramdown:
  input: GFM

# Optional: GitHub repo link
github_repo_url: "https://github.com/sdrangan/waveflow"

just_the_docs:
  favicon: "/assets/images/favicon.png"
  color_scheme: light

# Exclude source code and non-doc content from Jekyll processing.
# examples/ is intentionally kept so that generated HTML reports
# (e.g. examples/some_example/report.html) remain accessible as
# static files and can be linked from docs pages.
exclude:
  - waveflow/
  - tests/
  - plans/
  - CLAUDE.md
  - pyproject.toml
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

# examples/ stays served (above) so generated reports + source files remain
# linkable, but the example dirs' own markdown (README.md, CODEGEN_NOTES.md, …) is
# developer notes, not site content — keep every examples/*.md out of the nav tree
# and search. (docs/examples/ is a different path and is unaffected.)
defaults:
  - scope:
      path: "examples"
    values:
      nav_exclude: true
      search_exclude: true

